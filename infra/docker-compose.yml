version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stockflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stockflow-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: